name: IPTV EPG Builder

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch channels
        run: python fetch_channels.py

      - name: Generate EPG JSON
        run: python generate_epg.py

      - name: Generate M3U
        run: python generate_m3u.py

      - name: Debug output
        run: |
          echo "FILES:"
          ls -lah

      - name: Commit changes
        run: |
          git config user.name "EPG Bot"
          git config user.email "bot@github.com"

          git add epg.xml epg.json channels.json channels.m3u || true

          git commit -m "update epg" || echo "no changes"
          git push
