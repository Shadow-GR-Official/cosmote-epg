name: IPTV EPG Builder

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python fetch_channels.py

      - run: python generate_epg.py

      - name: Commit
        run: |
          git config user.name "EPG Bot"
          git config user.email "bot@github.com"
          git add epg.xml channels.json
          git commit -m "update epg" || echo "no changes"
          git push
