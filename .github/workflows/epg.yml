name: CosmOTE EPG Builder v2.33 2026

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      # 1. FETCH JSON
      - name: Fetch EPG
        run: python fetch_channels.py

      # 2. GENERATE XML
      - name: Generate XML
        run: python generate_epg.py

      # 3. DEBUG
      - name: Show files
        run: |
          ls -lah
          echo "---- epg.xml preview ----"
          head -n 10 epg.xml || true

      # 4. COMMIT
      - name: Commit & Push
        run: |
          git config user.name "EPG Bot"
          git config user.email "bot@github.com"

          git add epg.xml epg.json

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "EPG Update $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
