name: IPTV EPG Builder

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch channels
        run: python fetch_channels.py

      # 🔍 SAFE VALIDATION (supports all API formats)
      - name: Validate channels.json
        run: |
          python - << 'EOF'
          import json

          with open("channels.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          def get_id(ch):
              if not isinstance(ch, dict):
                  return None

              if "guid" in ch:
                  return ch["guid"]

              if "channel_id" in ch:
                  return ch["channel_id"]

              if "channel" in ch and isinstance(ch["channel"], dict):
                  return ch["channel"].get("guid")

              return None

          valid = [get_id(c) for c in data]
          valid = [v for v in valid if v]

          print(f"TOTAL channels: {len(data)}")
          print(f"VALID channels: {len(valid)}")

          if len(valid) == 0:
              print("SAMPLE:")
              print(data[0])
              raise Exception("NO VALID CHANNELS FOUND")
          EOF

      - name: Generate EPG JSON
        run: python generate_epg.py

      - name: Validate EPG JSON
        run: |
          python - << 'EOF'
          import json

          with open("epg.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          total_programs = sum(len(c.get("programs", [])) for c in data)

          print(f"EPG channels: {len(data)}")
          print(f"TOTAL programs: {total_programs}")

          if total_programs == 0:
              raise Exception("EPG EMPTY")
          EOF

      - name: Generate M3U
        run: python generate_m3u.py

      - name: Show files
        run: ls -lah

      - name: Commit changes
        run: |
          git config user.name "EPG Bot"
          git config user.email "bot@github.com"

          git add epg.xml epg.json channels.json channels.m3u || true

          git commit -m "update epg" || echo "no changes"
          git push
