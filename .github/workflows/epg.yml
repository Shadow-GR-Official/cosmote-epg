name: IPTV EPG Builder

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch channels
        run: python fetch_channels.py

      # 🔍 DEBUG 1 - channels validation
      - name: Validate channels.json
        run: |
          python - << 'EOF'
          import json

          with open("channels.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          total = len(data)
          valid = len([c for c in data if isinstance(c, dict) and ("guid" in c or "channel_id" in c)])

          print(f"TOTAL channels: {total}")
          print(f"VALID channels: {valid}")

          if valid == 0:
              raise Exception("NO VALID CHANNELS FOUND")
          EOF

      - name: Generate EPG JSON
        run: python generate_epg.py

      # 🔍 DEBUG 2 - epg.json validation
      - name: Validate epg.json
        run: |
          python - << 'EOF'
          import json

          with open("epg.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          total_channels = len(data)
          total_programs = sum(len(c.get("programs", [])) for c in data)

          print(f"EPG channels: {total_channels}")
          print(f"TOTAL programs: {total_programs}")

          if total_channels == 0:
              raise Exception("EPG JSON EMPTY")
          EOF

      - name: Generate M3U
        run: python generate_m3u.py

      - name: Show generated files
        run: |
          echo "===== FILE LIST ====="
          ls -lah

          echo "===== EPG XML SIZE ====="
          ls -lh epg.xml || echo "missing epg.xml"

          echo "===== EPG JSON SIZE ====="
          ls -lh epg.json || echo "missing epg.json"

          echo "===== M3U SIZE ====="
          ls -lh channels.m3u || echo "missing m3u"

      - name: Commit changes
        run: |
          git config user.name "EPG Bot"
          git config user.email "bot@github.com"

          git add epg.xml epg.json channels.json channels.m3u || true

          git commit -m "update epg" || echo "no changes"
          git push
