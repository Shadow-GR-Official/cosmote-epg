name: IPTV EPG Builder

on:
  schedule:
    - cron: "0 * * * *"   # κάθε 1 ώρα
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      # 1. FETCH JSON
      - name: Fetch EPG
        run: python fetch_channels.py

      # 2. BUILD XML
      - name: Generate XML
        run: python generate_epg.py

      # 3. DEBUG
      - name: Show files
        run: ls -lah

      # 4. COMMIT
      - name: Commit
        run: |
          git config user.name "EPG Bot"
          git config user.email "bot@github.com"

          git add epg.json epg.xml || true

          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
