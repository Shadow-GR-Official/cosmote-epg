name: IPTV EPG Builder

on:
  schedule:
    - cron: "0 * * * *"   # κάθε 1 ώρα
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      # 🔥 IMPORTANT: sync repo state (fixes silent overwrite issues)
      - name: Sync repo
        run: |
          git pull origin main || true

      # 1. FETCH JSON
      - name: Fetch EPG
        run: python fetch_channels.py

      # 2. GENERATE XML
      - name: Generate XML
        run: python generate_epg.py

      # 3. DEBUG (very important for cron)
      - name: Show files
        run: |
          ls -lah
          echo "---- epg.xml preview ----"
          head -n 20 epg.xml || true
          echo "---- epg.json preview ----"
          head -n 20 epg.json || true

      # 4. COMMIT CHANGES SAFELY
      - name: Commit
        run: |
          git config user.name "EPG Bot"
          git config user.email "bot@github.com"

          # ensure files exist before adding
          if [ -f epg.xml ] && [ -f epg.json ]; then
            git add epg.xml epg.json
          else
            echo "Missing output files!"
            exit 1
          fi

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
