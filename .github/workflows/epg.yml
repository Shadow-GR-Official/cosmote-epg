name: Cosmote.gr EPG Builder v20.04 2026

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TZ: Europe/Athens

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Create data folder
        run: mkdir -p data

      - name: Fetch Cosmote EPG
        run: python fetch_channels.py

      - name: Generate XML
        run: python generate_epg.py

      - name: Debug
        run: |
          ls -lah data/
          head -n 20 data/epg.xml || true

      - name: Commit & Push
        run: |
          git config user.name "EPG Bot"
          git config user.email "bot@github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Cosmote EPG $(date +'%Y-%m-%d %H:%M')"
          git push
